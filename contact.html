<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5383262801288621" crossorigin="anonymous"></script>
  <title>お問い合わせ | WIT PORT（ウィッポ）</title>
  <meta name="description" content="WIT PORTへのお問い合わせは、こちらのフォームよりお送りください。">
  <style>
    :root {
      --bg-dark: #0b1020;
      --bg-gradient: linear-gradient(135deg, #0b1020 0%, #111827 100%);
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-blue: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .container { max-width: 640px; margin: 0 auto; padding: 0 24px; width: 100%; }
    header {
      padding: 32px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: fadeInUp 0.8s ease-out;
    }
    .logo {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 2px;
      color: var(--text-main);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent-blue), #8b5cf6);
      border-radius: 8px;
      display: inline-block;
      box-shadow: 0 0 15px var(--accent-glow);
    }
    .back-link {
      color: var(--text-muted);
      font-size: 14px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text-main); }
    main {
      padding: 40px 0 80px;
      animation: fadeInUp 1s ease-out 0.2s backwards;
    }
    h1 {
      font-size: clamp(24px, 4vw, 32px);
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-main);
    }
    .lead {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .form-wrapper {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 24px;
      backdrop-filter: blur(10px);
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      max-width: 100%;
      margin: 0 auto;
    }
    .form-wrapper iframe {
      width: 100%;
      max-width: 100%;
      min-height: 800px;
      height: 857px;
      border: none;
      display: block;
      margin: 0 auto;
    }
    .back-to-top {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 20px;
      background: rgba(59, 130, 246, 0.2);
      border: 1px solid rgba(59, 130, 246, 0.4);
      border-radius: 10px;
      color: var(--text-main);
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
    }
    .back-to-top:hover {
      background: rgba(59, 130, 246, 0.3);
      border-color: var(--accent-blue);
    }
    footer {
      margin-top: auto;
      padding: 32px 0;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      border-top: 1px solid var(--card-border);
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <a href="index.html" class="logo">
        <span class="logo-icon"></span>
        WIT PORT
      </a>
      <a href="index.html" class="back-link">← トップへ戻る</a>
    </header>

    <main>
      <h1>お問い合わせ</h1>
      <p class="lead">ご質問、不具合報告は、以下のフォームよりお送りください。</p>

      <div class="form-wrapper">
        <iframe
          src="https://docs.google.com/forms/d/e/1FAIpQLSdT4fq8tjaTrGe0uojoix3OfNzAeJ5Hzq1Aal92OF0QGINTEw/viewform?embedded=true"
          width="640"
          height="857"
          frameborder="0"
          marginheight="0"
          marginwidth="0"
          title="お問い合わせフォーム"
        >読み込んでいます…</iframe>
      </div>
      <p style="text-align:center;"><a href="index.html" class="back-to-top">トップへ戻る</a></p>
    </main>
  </div>

  <footer>
    <p><a href="index.html" style="color:inherit;">トップ</a> | <a href="privacy.html" style="color:inherit;">プライバシーポリシー</a> | <a href="contact.html" style="color:inherit;">お問い合わせ</a></p>
    <p>&copy; 2026 WIT PORT. All rights reserved.</p>
  </footer>

</body>
</html>
